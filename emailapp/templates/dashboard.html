<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;

    /* 🔥 SAME TEAL BACKGROUND */
    background: linear-gradient(135deg, #6dd5ed, #2193b0);

    display: flex;
    height: 100vh;
}

/* SIDEBAR (GLASS) */
.sidebar {
    width: 230px;
    padding: 25px;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(18px);

    color: #0f172a;
}

.sidebar h2 {
    text-align: center;
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    padding: 12px;
    margin: 8px 0;
    text-decoration: none;
    color: #0f172a;
    border-radius: 10px;
    transition: 0.3s;
}

.sidebar a:hover {
    background: rgba(255,255,255,0.4);
}

/* MAIN */
.main {
    flex: 1;
    padding: 30px;
    overflow-y: auto;
}

/* TITLE */
.main h2 {
    color: #0f172a;
    margin-bottom: 20px;
}

/* CARDS */
.cards {
    display: flex;
    gap: 20px;
}

/* CARD STYLE */
.card {
    flex: 1;
    padding: 20px;
    border-radius: 18px;

    background: rgba(255,255,255,0.3);
    backdrop-filter: blur(15px);

    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
}

.card h2 {
    margin: 0;
    font-size: 28px;
    color: #0f172a;
}

.card p {
    color: #111;
    margin-top: 5px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
    margin-top: 25px;
}

/* CHART BOX */
.chart-box {
    padding: 20px;
    border-radius: 18px;

    background: rgba(255,255,255,0.3);
    backdrop-filter: blur(15px);

    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* SMALL BOX */
.small-box {
    padding: 20px;
    border-radius: 18px;
    text-align: center;

    background: rgba(255,255,255,0.3);
    backdrop-filter: blur(15px);

    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* TEXT */
.small-box p {
    color: #0f172a;
    margin-top: 10px;
}

/* CANVAS */
canvas {
    max-height: 250px;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>📧 Mail Panel</h2>

    <a href="/">📨 Send Email</a>
    <a href="/history/">📜 History</a>
    <a href="/dashboard/">📊 Dashboard</a>
    <a href="/contacts/">👥 Contacts</a>
    <a href="/logout/">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<h2>📊 Dashboard</h2>

<!-- CARDS -->
<div class="cards">

    <div class="card">
        <h2 id="total">{{ total }}</h2>
        <p>Total Emails</p>
    </div>

    <div class="card">
        <h2 id="sent">{{ sent }}</h2>
        <p>Sent</p>
    </div>

    <div class="card">
        <h2 id="failed">{{ failed }}</h2>
        <p>Failed</p>
    </div>

</div>

<!-- CHARTS -->
<div class="grid">

    <!-- BAR -->
    <div class="chart-box">
        <canvas id="barChart"></canvas>
    </div>

    <!-- PIE -->
    <div class="small-box">
        <canvas id="pieChart"></canvas>
        <p>Email Success Rate</p>
    </div>

</div>

</div>

<script>
const total = Number(document.getElementById("total").innerText);
const sent = Number(document.getElementById("sent").innerText);
const failed = Number(document.getElementById("failed").innerText);

// BAR CHART
new Chart(document.getElementById("barChart"), {
    type: 'bar',
    data: {
        labels: ['Total', 'Sent', 'Failed'],
        datasets: [{
            data: [total, sent, failed],
            backgroundColor: ['#2563eb', '#22c55e', '#ef4444']
        }]
    },
    options: {
        plugins: { legend: { display: false } }
    }
});

// PIE CHART
new Chart(document.getElementById("pieChart"), {
    type: 'doughnut',
    data: {
        labels: ['Sent', 'Failed'],
        datasets: [{
            data: [sent, failed],
            backgroundColor: ['#22c55e', '#ef4444']
        }]
    }
});
</script>

</body>
</html>
